<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LunarToons — Baca Manga & Manhwa Sub Indo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0a0f;
      --bg2:     #111118;
      --bg3:     #1a1a26;
      --bg4:     #22222e;
      --accent:  #e85d04;
      --accent2: #ff7b26;
      --accent3: #c44d00;
      --text:    #f0f0f0;
      --text2:   #888899;
      --text3:   #44445a;
      --border:  rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --nav-h:   60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
      padding-bottom: calc(var(--nav-h) + 20px);
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-user-select: none; user-select: none; }

    .topnav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; height: 56px;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 1px;
      color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .logo-dot { color: var(--accent); }
    .logo-sub {
      font-family: 'Outfit', sans-serif;
      font-size: 8px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text3);
      margin-top: 2px;
    }
    .topnav-right { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); transition: all 0.15s;
    }
    .icon-btn:active { background: var(--bg4); color: var(--text); }

    .hero-banner {
      position: relative; overflow: hidden;
      height: 200px; background: var(--bg2);
    }
    .hero-banner-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(20px) brightness(0.25);
      transform: scale(1.1);
      transition: background-image 0.5s ease;
    }
    .hero-banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(232,93,4,0.15) 0%, transparent 60%),
                  linear-gradient(to top, var(--bg) 0%, transparent 60%);
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 20px 18px; height: 100%;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--accent); color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 3px 10px;
      margin-bottom: 8px; width: fit-content;
    }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 0.5px;
      line-height: 1.1; color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      margin-bottom: 4px; cursor: pointer;
    }
    .hero-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: rgba(255,255,255,0.6);
      font-family: 'Outfit', sans-serif;
    }
    .hero-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent); }
    .hero-dots {
      position: absolute; top: 12px; right: 14px;
      display: flex; gap: 5px; z-index: 3;
    }
    .hero-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer; transition: all 0.2s;
    }
    .hero-dot.active { background: var(--accent); width: 18px; border-radius: 3px; }

    .search-section {
      padding: 14px 18px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg3); border: 1px solid var(--border);
      padding: 10px 14px; transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--accent); }
    .search-bar svg { color: var(--text3); flex-shrink: 0; }
    .search-bar input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text);
    }
    .search-bar input::placeholder { color: var(--text3); }

    .quick-filters {
      display: flex; gap: 6px; overflow-x: auto;
      padding: 12px 18px; scrollbar-width: none;
    }
    .filter-chip {
      flex-shrink: 0; padding: 6px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text3); transition: all 0.15s; cursor: pointer;
    }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
    .filter-chip:active { opacity: 0.8; }

    .section { margin-bottom: 8px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px 12px;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 0.5px; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::before {
      content: ''; width: 4px; height: 18px; background: var(--accent);
    }
    .section-more {
      font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 700; color: var(--accent);
      letter-spacing: 0.3px;
    }

    .manga-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; padding: 0 18px;
    }
    .manga-card {
      position: relative; overflow: hidden;
      cursor: pointer; background: var(--bg2);
      animation: fadeUp 0.4s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    .manga-poster { position: relative; aspect-ratio: 2/3; overflow: hidden; }
    .manga-poster img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.3s ease; filter: brightness(0.9);
    }
    .manga-card:active .manga-poster img { transform: scale(1.05); filter: brightness(1); }
    .manga-poster-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,1) 0%, rgba(10,10,15,0.5) 35%, transparent 60%);
    }
    .manga-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 6px 7px 7px; }
    .manga-title {
      font-family: 'Outfit', sans-serif;
      font-size: 10px; font-weight: 700; color: #fff;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.3;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .manga-chapter {
      font-size: 9px; color: var(--accent2);
      margin-top: 3px; font-family: 'Outfit', sans-serif; font-weight: 700;
    }
    .manga-type-badge {
      position: absolute; top: 0; left: 0;
      font-family: 'Outfit', sans-serif;
      font-size: 7.5px; font-weight: 800;
      padding: 3px 6px; color: white;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .manga-type-badge.manhwa { background: var(--accent); }
    .manga-type-badge.manga  { background: #2563eb; }
    .manga-type-badge.manhua { background: #7c3aed; }

    .skeleton-card { overflow: hidden; background: var(--bg2); }
    .skeleton-poster { aspect-ratio: 2/3; background: var(--bg3); animation: pulse 1.5s ease-in-out infinite; }
    .skeleton-line { height: 9px; margin: 7px 7px 4px; background: var(--bg3); animation: pulse 1.5s ease-in-out infinite; }
    .skeleton-line.short { width: 55%; margin-bottom: 7px; }

    .empty-state {
      grid-column: 1/-1; display: flex; flex-direction: column;
      align-items: center; padding: 48px 24px; gap: 10px;
      text-align: center; color: var(--text3);
    }
    .empty-state p { font-size: 13px; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; height: var(--nav-h);
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border2);
      display: flex; align-items: stretch; z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      color: var(--text3); cursor: pointer; transition: color 0.2s;
      padding: 8px 0; -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .nav-item::after {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%;
      height: 2px; background: transparent; transition: background 0.2s;
    }
    .nav-item.active::after { background: var(--accent); }
    .nav-item svg { width: 20px; height: 20px; }
    .nav-item span {
      font-family: 'Outfit', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .nav-item.active { color: var(--accent); }

    .toast {
      position: fixed; bottom: calc(var(--nav-h) + 14px); left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--bg4); color: var(--text);
      border: 1px solid var(--border2); padding: 10px 20px;
      font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1); z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  </style>
</head>
<body>

  <nav class="topnav">
    <div>
      <div class="logo">LUNAR<span class="logo-dot">.</span>TOONS</div>
      <div class="logo-sub">Baca Manga Sub Indo</div>
    </div>
    <div class="topnav-right">
      <button class="icon-btn" onclick="window.location.href='/search'">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="hero-banner" id="hero-banner">
    <div class="hero-banner-bg" id="hero-bg"></div>
    <div class="hero-banner-overlay"></div>
    <div class="hero-dots" id="hero-dots"></div>
    <div class="hero-content" id="hero-content">
      <div style="color:var(--text3);font-size:12px;font-family:'Outfit',sans-serif">Memuat...</div>
    </div>
  </div>

  <div class="search-section">
    <div class="search-bar">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Cari manga, manhwa, manhua..."
        autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="quick-filters">
    <div class="filter-chip active" onclick="filterSection(this,'all')">Semua</div>
    <div class="filter-chip" onclick="filterSection(this,'manhwa')">Manhwa</div>
    <div class="filter-chip" onclick="filterSection(this,'manga')">Manga</div>
    <div class="filter-chip" onclick="filterSection(this,'manhua')">Manhua</div>
  </div>

  <div id="sections-wrap"></div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="window.location.href='/'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span>Home</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/browse'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>Browse</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/search'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span>Cari</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/bookmarks'">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Simpan</span>
    </div>
  </nav>

  <div id="toast" class="toast"></div>

  <script>
    function escHtml(str) {
      return (str || '').toString()
        .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
    function renderSkeleton(n = 6) {
      return Array(n).fill(0).map(() => `
        <div class="skeleton-card">
          <div class="skeleton-poster"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>`).join('');
    }
    function getTypeBadge(type) {
      if (!type) return '';
      const t = type.toLowerCase();
      const cls = t.includes('manhwa') ? 'manhwa' : t.includes('manhua') ? 'manhua' : 'manga';
      return `<span class="manga-type-badge ${cls}">${escHtml(type)}</span>`;
    }
    function renderCard(item) {
      const cover = item.cover || 'https://placehold.co/200x300/111118/44445a?text=No+Cover';
      const url   = encodeURIComponent(item.url || '');
      return `<div class="manga-card" onclick="window.location.href='/detail?url=${url}'">
        <div class="manga-poster">
          <img src="${escHtml(cover)}" alt="${escHtml(item.title)}" loading="lazy"
            onerror="this.src='https://placehold.co/200x300/111118/44445a?text=No+Cover'">
          <div class="manga-poster-overlay"></div>
          ${getTypeBadge(item.type)}
          <div class="manga-info">
            <div class="manga-title">${escHtml(item.title)}</div>
            ${item.chapter ? `<div class="manga-chapter">${escHtml(item.chapter)}</div>` : ''}
          </div>
        </div>
      </div>`;
    }

    // ── HERO ──
    let heroItems = [], heroIdx = 0, heroTimer = null;

    function renderCard(item) {
  const cover = item.cover || 'https://placehold.co/200x300/111118/44445a?text=No+Cover';
  const url   = encodeURIComponent(item.url || '');
  const label = item.updated_at || item.chapter || '';
  return `<div class="manga-card" onclick="window.location.href='/detail?url=${url}'">
    <div class="manga-poster">
      <img src="${escHtml(cover)}" alt="${escHtml(item.title)}" loading="lazy"
        onerror="this.src='https://placehold.co/200x300/111118/44445a?text=No+Cover'">
      <div class="manga-poster-overlay"></div>
      ${getTypeBadge(item.type)}
      <div class="manga-info">
        <div class="manga-title">${escHtml(item.title)}</div>
        ${label ? `<div class="manga-chapter">${escHtml(label)}</div>` : ''}
      </div>
    </div>
  </div>`;
    }
    
    function goHero(idx) {
      heroIdx = idx;
      const item    = heroItems[idx];
      const bg      = document.getElementById('hero-bg');
      const content = document.getElementById('hero-content');
      const dots    = document.querySelectorAll('.hero-dot');
      if (bg) bg.style.backgroundImage = `url('${escHtml(item.cover || '')}')`;
      if (content) {
        const url = encodeURIComponent(item.url || '');
        content.innerHTML = `
          <div class="hero-tag">
            <svg width="9" height="9" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            ${escHtml(item.type || 'Manga')}
          </div>
          <div class="hero-title" onclick="window.location.href='/detail?url=${url}'">${escHtml(item.title)}</div>
          <div class="hero-meta">
            ${item.chapter ? `<span>${escHtml(item.chapter)}</span><div class="hero-meta-dot"></div>` : ''}
            ${item.status  ? `<span>${escHtml(item.status)}</span>` : ''}
          </div>`;
      }
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    // ── SECTIONS ──
    let allSections = [], activeFilter = 'all';

    function renderSections(sections) {
      allSections = sections;
      const wrap = document.getElementById('sections-wrap');
      if (!sections.length) {
        wrap.innerHTML = '<div style="padding:40px 18px;text-align:center;color:var(--text3);font-size:13px">Tidak ada data</div>';
        return;
      }
      wrap.innerHTML = sections.map(sec => {
        const items = activeFilter === 'all'
          ? sec.items
          : sec.items.filter(i => (i.type || '').toLowerCase().includes(activeFilter));
        if (!items.length) return '';
        const viewAll = sec.view_all
          ? `<a href="/browse" class="section-more">Lihat Semua</a>` : '';
        return `<div class="section">
          <div class="section-header">
            <div class="section-title">${escHtml(sec.section)}</div>
            ${viewAll}
          </div>
          <div class="manga-grid">${items.map(renderCard).join('')}</div>
        </div>`;
      }).join('');
    }

    function filterSection(el, type) {
      activeFilter = type;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      renderSections(allSections);
    }

    // ── LOAD HOME ──
    async function loadHome() {
      const wrap = document.getElementById('sections-wrap');
      wrap.innerHTML = ['Popular Today','Project Update','Latest Update'].map(s => `
        <div class="section">
          <div class="section-header"><div class="section-title">${s}</div></div>
          <div class="manga-grid">${renderSkeleton(6)}</div>
        </div>`).join('');

      try {
        const res  = await fetch('/api/manga/home');
        const data = await res.json();
        if (!data.status) throw new Error(data.error || 'Gagal');

        const sections = data.result || [];
        const popularSection = sections.find(s => s.section.toLowerCase().includes('popular')) || sections[0];
        if (popularSection) renderHero(popularSection.items.filter(i => i.cover));
        renderSections(sections);
      } catch(e) {
        wrap.innerHTML = `<div class="section"><div class="manga-grid"><div class="empty-state">
          <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>Gagal memuat. Coba lagi nanti.</p>
        </div></div></div>`;
        showToast('Gagal memuat: ' + e.message);
      }
    }

    // ── SEARCH ──
    const searchInput = document.getElementById('search-input');
    let searchTimer;
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const q = searchInput.value.trim();
        if (q) window.location.href = `/search?q=${encodeURIComponent(q)}`;
      }
    });
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length > 2) {
        searchTimer = setTimeout(() => {
          window.location.href = `/search?q=${encodeURIComponent(q)}`;
        }, 600);
      }
    });

    loadHome();
  </script>
</body>
</html>
